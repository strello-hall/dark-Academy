<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فرقة الظلام | انمي باور</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="logo-header">
      <h1>فرقة الظلام</h1>
      <div class="subtitle">انمي باور</div>
    </div>
    <img src="./received-271661400835153.png" id="team_logo">
    <div class="form-card">
      <div class="wing-left"></div>
      <div class="wing-right"></div>

      <form id="memberForm">
        <div class="form-group">
          <label for="memberName">اسم العضو</label>
          <input type="text" id="memberName" placeholder="أدخل اسم العضو" required>
        </div>

        <div class="form-group">
          <label for="profileLink">رابط البروفايل</label>
          <input type="url" id="profileLink" placeholder="https://..." required>
        </div>

        <div class="form-group">
          <label for="post1">رابط المنشور الأول</label>
          <input type="url" id="post1" placeholder="https://...">
        </div>

        <div class="form-group">
          <label for="post2">رابط المنشور الثاني</label>
          <input type="url" id="post2" placeholder="https://...">
        </div>

        <button type="submit" class="btn">إنشاء طلب التخرج</button>
      </form>
    </div>
  </div>
 <script src="index.js"></script>
</body>
</html>
